<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — ASCII Corridor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
  }
  #frame {
    font-family: 'Courier New', 'Menlo', 'Consolas', monospace;
    color: #33ffcc;
    white-space: pre;
    line-height: 1.1;
    letter-spacing: 0.05em;
    text-align: center;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,10,10,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    cursor: pointer;
  }
  #overlay span {
    font-family: 'Courier New', monospace;
    color: #33ffcc;
    font-size: 1.4em;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>
<pre id="frame"></pre>
<div id="overlay"><span>AURA ASCII Corridor<br><br>Click to start<br>(microphone required)</span></div>
<script>
// =========================================================================
// AURA Browser ASCII Renderer — Demo Mode (JS Raycaster + Web Audio)
// =========================================================================

// --- Configuration ---
const COLS = 100;
const ROWS = 45;
const MAP_SIZE = 32;
const FOV = Math.PI / 3;       // 60 degrees
const MAX_DIST = 20.0;
const MOVE_SPEED = 0.12;
const TURN_SPEED = 0.06;
const TARGET_FPS = 10;

// --- Glyph Palettes (matching Python ascii_corridor.py) ---
const WALL_COOL  = ['\u2588','\u2593','\u2592','\u2591','\u2554','\u2550','\u2557','\u2551'];
const WALL_WARM  = ['\u2588','\u2593','\u2592','\u2591','\u256D','\u2500','\u256E','\u2502'];
const FLOOR_G    = ['\u00B7','.',':',';',' '];
const CEIL_G     = ['`','\'','"','*',' '];
const FLASH_CH   = ['\u2726','\u2727','\u2605','\u2606','\u26A1','\u2739','\u2738'];
const INTENSE_W  = ['\u2589','\u258A','\u258B','\u258C'];

// --- State ---
let worldMap = null;
let posX = 0, posY = 0, angle = 0;
let audioCtx = null, analyser = null, freqData = null, timeData = null;
let ctx16 = new Float32Array(16);  // the 16-float audio context vector
let emaState = new Float32Array(7);
const EMA_ALPHA = 0.3;
let keys = {};
let running = false;
let prevOnsetEnergy = 0;
let bpmEstimate = 0.5;            // normalized BPM [0,1]
let beatTimes = [];

// --- Map Generation (random walk, identical to Python) ---
function generateMap(seed) {
  const rng = mulberry32(seed);
  const grid = new Uint8Array(MAP_SIZE * MAP_SIZE).fill(1);
  const cx = MAP_SIZE >> 1, cy = MAP_SIZE >> 1;
  let px = cx, py = cy;
  grid[px * MAP_SIZE + py] = 0;
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];

  for (let i = 0; i < (MAP_SIZE * MAP_SIZE / 3)|0; i++) {
    const [dx, dy] = dirs[(rng() * 4)|0];
    const runLen = 2 + ((rng() * 3)|0);
    for (let j = 0; j < runLen; j++) {
      const nx = px + dx, ny = py + dy;
      if (nx >= 1 && nx < MAP_SIZE-1 && ny >= 1 && ny < MAP_SIZE-1) {
        px = nx; py = ny;
        grid[px * MAP_SIZE + py] = 0;
        if (rng() > 0.6) {
          for (const [ddx, ddy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
            const wx = nx+ddx, wy = ny+ddy;
            if (wx >= 1 && wx < MAP_SIZE-1 && wy >= 1 && wy < MAP_SIZE-1)
              grid[wx * MAP_SIZE + wy] = 0;
          }
        }
      }
    }
    if (rng() > 0.7) { px = cx; py = cy; }
  }
  return grid;
}

function findSpawn(grid, rng) {
  const floors = [];
  for (let i = 1; i < MAP_SIZE-1; i++)
    for (let j = 1; j < MAP_SIZE-1; j++)
      if (grid[i * MAP_SIZE + j] === 0) floors.push([i, j]);
  const idx = (rng() * floors.length)|0;
  return [floors[idx][0] + 0.5, floors[idx][1] + 0.5];
}

// Simple seeded PRNG (Mulberry32)
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// --- DDA Raycaster ---
function raycast() {
  const perpDist = new Float64Array(COLS);
  const hit      = new Uint8Array(COLS);
  const side     = new Int8Array(COLS);

  for (let col = 0; col < COLS; col++) {
    const rayOff = (col / COLS - 0.5) * FOV;
    const rayA   = angle + rayOff;
    const rdx    = Math.cos(rayA);
    const rdy    = Math.sin(rayA);
    const sdx    = rdx === 0 ? 1e10 : Math.abs(1 / rdx);
    const sdy    = rdy === 0 ? 1e10 : Math.abs(1 / rdy);

    let mx = posX | 0, my = posY | 0;
    const stepX = rdx < 0 ? -1 : 1;
    const stepY = rdy < 0 ? -1 : 1;
    let sideDistX = rdx < 0 ? (posX - mx) * sdx : (mx + 1 - posX) * sdx;
    let sideDistY = rdy < 0 ? (posY - my) * sdy : (my + 1 - posY) * sdy;
    let s = 0;

    for (let step = 0; step < 64; step++) {
      if (sideDistX < sideDistY) {
        sideDistX += sdx; mx += stepX; s = 0;
      } else {
        sideDistY += sdy; my += stepY; s = 1;
      }
      if (mx < 0 || mx >= MAP_SIZE || my < 0 || my >= MAP_SIZE) break;
      if (worldMap[mx * MAP_SIZE + my] === 1) {
        hit[col] = 1;
        side[col] = s;
        break;
      }
    }
    const pd = s === 0 ? sideDistX - sdx : sideDistY - sdy;
    perpDist[col] = Math.max(pd, 0.01);
  }
  return { perpDist, hit, side };
}

// --- ASCII Renderer (port of Python render_ascii) ---
function renderAscii(perpDist, hit, side) {
  const af = unpackContext(ctx16);
  const wallGlyphs = af.temperature >= 0.5 ? WALL_WARM : WALL_COOL;
  const nWall  = wallGlyphs.length;
  const nFloor = FLOOR_G.length;
  const nCeil  = CEIL_G.length;

  const bassShift = -af.bass * 1.5;
  const rmsThreshold = 0.6;
  const onsetFlashProb = af.onset * 0.4;

  // Pre-compute geometry per column
  const lineHeight = new Int32Array(COLS);
  const drawStart  = new Int32Array(COLS);
  const drawEnd    = new Int32Array(COLS);
  const fog        = new Float64Array(COLS);

  for (let c = 0; c < COLS; c++) {
    const lh = (ROWS / Math.max(perpDist[c], 0.01)) | 0;
    lineHeight[c] = lh;
    drawStart[c]  = Math.max(0, Math.min((ROWS >> 1) - (lh >> 1), ROWS));
    drawEnd[c]    = Math.max(0, Math.min((ROWS >> 1) + (lh >> 1), ROWS));
    fog[c]        = Math.max(0, Math.min(1 - perpDist[c] / MAX_DIST, 1));
  }

  const lines = [];
  for (let row = 0; row < ROWS; row++) {
    let buf = '';
    for (let col = 0; col < COLS; col++) {
      if (!hit[col]) { buf += ' '; continue; }
      const ds = drawStart[col];
      const de = drawEnd[col];

      // Onset flash
      if (onsetFlashProb > 0 && Math.random() < onsetFlashProb) {
        buf += FLASH_CH[(Math.random() * FLASH_CH.length) | 0];
        continue;
      }

      let ch;
      if (row < ds) {
        // Ceiling
        const frac = ds === 0 ? 0 : 1 - row / ds;
        let idx = (frac * (nCeil - 1)) | 0;
        idx = Math.max(0, idx - ((af.high * 1.5) | 0));
        idx = Math.max(0, Math.min(idx, nCeil - 1));
        ch = CEIL_G[idx];
      } else if (row >= de) {
        // Floor
        const frac = de >= ROWS ? 0 : (row - de) / Math.max(ROWS - de, 1);
        let idx = (frac * (nFloor - 1)) | 0;
        idx = Math.max(0, idx - ((af.mid * 1.0) | 0));
        idx = Math.max(0, Math.min(idx, nFloor - 1));
        ch = FLOOR_G[idx];
      } else {
        // Wall
        const distNorm = Math.max(0, Math.min(perpDist[col] / MAX_DIST, 1));
        let idxF = distNorm * (nWall - 1) + bassShift;
        let idx = Math.max(0, Math.min(idxF | 0, nWall - 1));
        if (side[col] === 1) idx = Math.min(idx + 1, nWall - 1);

        if (af.rms > rmsThreshold && distNorm < 0.3) {
          let ii = ((1 - distNorm / 0.3) * (INTENSE_W.length - 1)) | 0;
          ii = Math.max(0, Math.min(ii, INTENSE_W.length - 1));
          ch = INTENSE_W[ii];
        } else {
          ch = wallGlyphs[idx];
        }
      }

      // Fog fade
      if (fog[col] < 0.15) {
        ch = ' ';
      } else if (fog[col] < 0.3) {
        if (row < ds)       ch = nCeil > 1 ? CEIL_G[nCeil - 2] : ' ';
        else if (row >= de) ch = nFloor > 1 ? FLOOR_G[nFloor - 2] : ' ';
      }
      buf += ch;
    }
    lines.push(buf);
  }
  return lines.join('\n');
}

// --- Audio Context Vector ---
function unpackContext(c) {
  return {
    bass:        (c[0] + c[1]) / 2,
    mid:         (c[2] + c[3]) / 2,
    high:        (c[4] + c[5]) / 2,
    onset:       (c[6] + c[7]) / 2,
    bpm:         (c[8] + c[9]) / 2,
    temperature: (c[10] + c[11]) / 2,
    rms:         (c[12] + c[13]) / 2,
  };
}

function formatContextLine(c) {
  const af = unpackContext(c);
  return `[b=${af.bass.toFixed(2)} m=${af.mid.toFixed(2)} h=${af.high.toFixed(2)} ` +
         `o=${af.onset.toFixed(2)} bpm=${af.bpm.toFixed(2)} ` +
         `t=${af.temperature.toFixed(2)} rms=${af.rms.toFixed(2)}]`;
}

// --- Web Audio Feature Extraction ---
function extractAudioFeatures() {
  if (!analyser || !freqData) return;
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const fftSize = analyser.fftSize;
  const sr = audioCtx.sampleRate;
  const binHz = sr / fftSize;

  // Band energy helper: average of bins in [lo, hi] Hz, normalized to [0,1]
  function bandEnergy(lo, hi) {
    const loB = Math.max(0, Math.floor(lo / binHz));
    const hiB = Math.min(freqData.length - 1, Math.ceil(hi / binHz));
    if (hiB <= loB) return 0;
    let sum = 0;
    for (let i = loB; i <= hiB; i++) sum += freqData[i];
    return (sum / ((hiB - loB + 1) * 255));
  }

  // 1. Sub-bass (20-80 Hz)
  const bass = bandEnergy(20, 80);

  // 2. Mid (250 Hz - 2 kHz)
  const mid = bandEnergy(250, 2000);

  // 3. High (4-20 kHz)
  const high = bandEnergy(4000, 20000);

  // 4. Onset: simple spectral flux proxy — compare current energy to previous
  let totalEnergy = 0;
  for (let i = 0; i < freqData.length; i++) totalEnergy += freqData[i];
  totalEnergy /= (freqData.length * 255);
  const flux = Math.max(0, totalEnergy - prevOnsetEnergy);
  const onset = Math.min(1, flux * 8);  // scale up for sensitivity
  prevOnsetEnergy = totalEnergy * 0.7 + prevOnsetEnergy * 0.3;

  // 5. BPM — simple beat tracking via onset peaks
  if (onset > 0.3) {
    const now = performance.now();
    beatTimes.push(now);
    // Keep last 20 beats
    while (beatTimes.length > 20) beatTimes.shift();
    if (beatTimes.length >= 3) {
      let intervals = 0, count = 0;
      for (let i = 1; i < beatTimes.length; i++) {
        intervals += beatTimes[i] - beatTimes[i-1];
        count++;
      }
      const avgMs = intervals / count;
      const bpm = Math.min(200, Math.max(60, 60000 / avgMs));
      bpmEstimate = (bpm - 60) / 140;  // normalize 60-200 -> 0-1
    }
  }

  // 6. Spectral centroid
  let centroidNum = 0, centroidDen = 0;
  for (let i = 0; i < freqData.length; i++) {
    const freq = i * binHz;
    centroidNum += freq * freqData[i];
    centroidDen += freqData[i];
  }
  const centroid = centroidDen > 0 ? centroidNum / centroidDen : 0;
  const centroidNorm = Math.min(1, centroid / (sr / 2));

  // 7. RMS from time-domain data
  let rmsSum = 0;
  for (let i = 0; i < timeData.length; i++) {
    const v = (timeData[i] - 128) / 128;
    rmsSum += v * v;
  }
  const rms = Math.min(1, Math.sqrt(rmsSum / timeData.length) * 3);

  // Raw values
  const raw = [bass, mid, high, onset, bpmEstimate, centroidNorm, rms];

  // EMA smoothing + interleave into 16-float vector
  for (let i = 0; i < 7; i++) {
    emaState[i] = EMA_ALPHA * raw[i] + (1 - EMA_ALPHA) * emaState[i];
    ctx16[i * 2]     = raw[i];
    ctx16[i * 2 + 1] = emaState[i];
  }
  ctx16[14] = 0; ctx16[15] = 0;
}

// --- Movement (auto-walk + keyboard) ---
function handleMovement() {
  // Auto-walk forward with slight drift based on audio
  const af = unpackContext(ctx16);
  const autoSpeed = MOVE_SPEED * (0.5 + af.bpm * 0.8);

  // Keyboard overrides
  let forward = 0, turn = 0;
  if (keys['ArrowUp']   || keys['w'] || keys['W']) forward =  1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) forward = -1;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) turn    = -1;
  if (keys['ArrowRight']|| keys['d'] || keys['D']) turn    =  1;

  // If no keyboard input, auto-walk with random turns
  if (forward === 0 && turn === 0) {
    forward = 1;
    // Random turns biased by audio onset
    if (Math.random() < 0.02 + af.onset * 0.08) {
      turn = Math.random() < 0.5 ? -1 : 1;
    }
  }

  // Apply turn
  angle += turn * TURN_SPEED * (1 + af.rms * 0.5);

  // Apply forward/backward with collision
  if (forward !== 0) {
    const speed = forward > 0 ? autoSpeed : MOVE_SPEED * 0.5;
    const dx = Math.cos(angle) * speed * forward;
    const dy = Math.sin(angle) * speed * forward;
    const nx = posX + dx, ny = posY + dy;
    const gx = nx | 0, gy = ny | 0;
    if (gx >= 0 && gx < MAP_SIZE && gy >= 0 && gy < MAP_SIZE &&
        worldMap[gx * MAP_SIZE + gy] === 0) {
      posX = nx; posY = ny;
    } else {
      // Wall collision — try to turn
      angle += (Math.random() < 0.5 ? 1 : -1) * TURN_SPEED * 3;
    }
  }

  angle = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
}

// --- Font Auto-Scaling ---
function autoScale() {
  const el = document.getElementById('frame');
  // Target: COLS chars wide, ROWS+1 lines tall (including context line)
  // Measure one character at a reference size
  el.style.fontSize = '10px';
  const test = document.createElement('span');
  test.style.font = getComputedStyle(el).font;
  test.textContent = 'M';
  document.body.appendChild(test);
  const charW = test.offsetWidth;
  const charH = test.offsetHeight * 1.1;  // account for line-height
  document.body.removeChild(test);

  if (charW === 0 || charH === 0) return;

  const scaleW = window.innerWidth / (charW * COLS);
  const scaleH = window.innerHeight / (charH * (ROWS + 2));
  const scale = Math.min(scaleW, scaleH) * 0.95;
  el.style.fontSize = (10 * scale) + 'px';
}

// --- Main Loop ---
function tick() {
  if (!running) return;
  extractAudioFeatures();
  handleMovement();

  const { perpDist, hit, side } = raycast();
  const asciiFrame = renderAscii(perpDist, hit, side);
  const contextLine = formatContextLine(ctx16);

  const el = document.getElementById('frame');
  el.textContent = contextLine + '\n' + asciiFrame;

  setTimeout(tick, 1000 / TARGET_FPS);
}

// --- Init ---
async function init() {
  document.getElementById('overlay').remove();

  // Generate map
  const seed = (Date.now() & 0xFFFF) ^ 42;
  const rng = mulberry32(seed);
  worldMap = generateMap(seed);
  [posX, posY] = findSpawn(worldMap, rng);
  angle = rng() * Math.PI * 2;

  // Start audio capture
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.7;
    source.connect(analyser);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);
  } catch (e) {
    console.warn('Microphone unavailable, running with silent audio context.', e);
    // Create a silent oscillator so the feature extractor still works
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    const osc = audioCtx.createOscillator();
    osc.frequency.value = 0;
    const gain = audioCtx.createGain();
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(analyser);
    osc.start();
    freqData = new Uint8Array(analyser.frequencyBinCount);
    timeData = new Uint8Array(analyser.fftSize);
  }

  // Keyboard
  document.addEventListener('keydown', e => { keys[e.key] = true; });
  document.addEventListener('keyup',   e => { keys[e.key] = false; });

  // Scale and start
  autoScale();
  window.addEventListener('resize', autoScale);
  running = true;
  tick();
}

document.getElementById('overlay').addEventListener('click', init);
</script>
</body>
</html>
