<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AURA — Flappy Ball (JEPA World Model)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
  #frame { font-family: 'Courier New', monospace; color: #33ffcc; white-space: pre; line-height: 1.1; letter-spacing: 0.05em; text-align: center; }
  #status { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); font-family: 'Courier New', monospace; font-size: 1.1em; color: #ff33cc; text-align: center; }
  #meter { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; height: 20px; border: 1px solid #33ffcc; }
  #meter-fill { height: 100%; background: #33ffcc; width: 0%; transition: width 0.05s; }
  #info { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-family: 'Courier New', monospace; font-size: 0.65em; color: #33ffcc55; }
  #overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,10,10,0.92); display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
  #overlay span { font-family: 'Courier New', monospace; color: #33ffcc; font-size: 1.3em; text-align: center; line-height: 2; }
  label.music-btn { position: fixed; top: 8px; right: 12px; z-index: 20; font-family: 'Courier New', monospace; font-size: 0.85em; color: #33ffcc; border: 1px solid #33ffcc; padding: 4px 10px; cursor: pointer; }
  label.music-btn input { display: none; }
</style>
</head>
<body>

<div id="overlay"><span>
AURA — Flappy Ball<br><br>
Make noise to keep the ball flying!<br>
Silence = gravity wins<br><br>
The AI predicts all physics.<br><br>
Click to start (allow mic)
</span></div>

<div id="status">Connecting...</div>
<pre id="frame"></pre>
<div id="meter"><div id="meter-fill"></div></div>
<div id="info">JEPA World Model — neural network predicts physics from your audio</div>

<label class="music-btn">LOAD MUSIC
  <input type="file" id="music-file" accept="audio/*">
</label>

<script>
let audioCtx, analyser, freqData, timeData;
const ctx16 = new Float32Array(16);
let emaState = new Float32Array(7);
const EMA_ALPHA = 0.3;
let prevOnsetEnergy = 0;
let bpmEstimate = 0.5;
let beatTimes = [];
let ws = null;
let running = false;

function connectWS() {
  ws = new WebSocket('ws://localhost:8767/ws-flappy');
  ws.onopen = () => { document.getElementById('status').textContent = 'Make noise to keep the ball up!'; };
  ws.onclose = () => { setTimeout(connectWS, 2000); };
  ws.onerror = () => { document.getElementById('status').textContent = 'Server not running on 8767'; };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.frame) {
      document.getElementById('frame').textContent = msg.frame;
    }
  };
}

function extractAudioFeatures() {
  if (!analyser || !freqData) return;
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);

  const sr = audioCtx.sampleRate;
  const binHz = sr / analyser.fftSize;

  function bandEnergy(lo, hi) {
    const loB = Math.max(0, Math.floor(lo / binHz));
    const hiB = Math.min(freqData.length - 1, Math.ceil(hi / binHz));
    if (hiB <= loB) return 0;
    let sum = 0;
    for (let i = loB; i <= hiB; i++) sum += freqData[i];
    return (sum / ((hiB - loB + 1) * 255));
  }

  const bass = bandEnergy(20, 80);
  const mid = bandEnergy(250, 2000);
  const high = bandEnergy(4000, 20000);

  let totalEnergy = 0;
  for (let i = 0; i < freqData.length; i++) totalEnergy += freqData[i];
  totalEnergy /= (freqData.length * 255);
  const flux = Math.max(0, totalEnergy - prevOnsetEnergy);
  const onset = Math.min(1, flux * 8);
  prevOnsetEnergy = totalEnergy * 0.7 + prevOnsetEnergy * 0.3;

  if (onset > 0.3) {
    const now = performance.now();
    beatTimes.push(now);
    while (beatTimes.length > 20) beatTimes.shift();
    if (beatTimes.length >= 3) {
      let intervals = 0, count = 0;
      for (let i = 1; i < beatTimes.length; i++) { intervals += beatTimes[i] - beatTimes[i-1]; count++; }
      bpmEstimate = Math.min(1, Math.max(0, (60000 / (intervals / count) - 60) / 140));
    }
  }

  let centroidNum = 0, centroidDen = 0;
  for (let i = 0; i < freqData.length; i++) { centroidNum += (i * binHz) * freqData[i]; centroidDen += freqData[i]; }
  const centroidNorm = centroidDen > 0 ? Math.min(1, centroidNum / centroidDen / (sr / 2)) : 0;

  let rmsSum = 0;
  for (let i = 0; i < timeData.length; i++) { const v = (timeData[i] - 128) / 128; rmsSum += v * v; }
  const rms = Math.min(1, Math.sqrt(rmsSum / timeData.length) * 3);

  const raw = [bass, mid, high, onset, bpmEstimate, centroidNorm, rms];
  for (let i = 0; i < 7; i++) {
    emaState[i] = EMA_ALPHA * raw[i] + (1 - EMA_ALPHA) * emaState[i];
    ctx16[i * 2] = raw[i];
    ctx16[i * 2 + 1] = emaState[i];
  }
  ctx16[14] = 0; ctx16[15] = 0;
}

// Send audio continuously at 10 FPS
setInterval(() => {
  if (!ws || ws.readyState !== WebSocket.OPEN || !running) return;
  extractAudioFeatures();
  const rms = (ctx16[12] + ctx16[13]) / 2;
  document.getElementById('meter-fill').style.width = (rms * 100) + '%';
  document.getElementById('meter-fill').style.background = rms > 0.3 ? '#33ffcc' : '#ff33cc44';
  ws.send(JSON.stringify({ audio: Array.from(ctx16) }));
}, 100);

// Music loader
document.getElementById('music-file').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    audioCtx.decodeAudioData(ev.target.result, (buffer) => {
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(analyser);
      source.connect(audioCtx.destination);
      source.start();
    });
  };
  reader.readAsArrayBuffer(file);
});

// Init
document.getElementById('overlay').addEventListener('click', async () => {
  document.getElementById('overlay').remove();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx.createMediaStreamSource(stream).connect(analyser);
  } catch (e) {
    document.getElementById('status').textContent = 'Need mic access!';
    return;
  }

  running = true;
  connectWS();

  const el = document.getElementById('frame');
  function scale() {
    const s = Math.min(window.innerWidth / (80 * 9.6), (window.innerHeight - 80) / (40 * 11)) * 0.95;
    el.style.fontSize = (10 * s) + 'px';
  }
  scale();
  window.addEventListener('resize', scale);
});
</script>
</body>
</html>
