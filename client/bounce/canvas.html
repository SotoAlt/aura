<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AURA — JEPA World Model (Canvas)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
  canvas { border: 2px solid #33ffcc; }
  #status { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); font-family: 'Courier New', monospace; font-size: 1.1em; color: #ff33cc; }
  #meter { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; height: 16px; border: 1px solid #33ffcc; }
  #meter-fill { height: 100%; background: #33ffcc; width: 0%; }
  #info { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-family: 'Courier New', monospace; font-size: 0.6em; color: #33ffcc44; }
  #overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,10,10,0.9); display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
  #overlay span { font-family: 'Courier New', monospace; color: #33ffcc; font-size: 1.2em; text-align: center; line-height: 2; }
</style>
</head>
<body>

<div id="overlay"><span>
AURA — JEPA World Model<br><br>
Make noise → ball goes up<br>
Silence → gravity pulls down<br><br>
Click to start (allow mic)
</span></div>

<div id="status">Connecting...</div>
<canvas id="c" width="800" height="400"></canvas>
<div id="meter"><div id="meter-fill"></div></div>
<div id="info">JEPA predicts physics from your audio — neural network IS the engine</div>

<script>
const W = 800, H = 400;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let audioCtx, analyser, freqData, timeData;
const ctx16 = new Float32Array(16);
let emaState = new Float32Array(7);
const EMA_ALPHA = 0.3;
let prevOnsetEnergy = 0;
let bpmEstimate = 0.5;
let beatTimes = [];
let ws = null;

// Ball state from server
let ballX = W/2, ballY = H*0.8;
let trail = [];

function connectWS() {
  ws = new WebSocket('ws://localhost:8767/ws-canvas');
  ws.onopen = () => { document.getElementById('status').textContent = 'Make noise to push the ball up!'; };
  ws.onclose = () => { setTimeout(connectWS, 2000); };
  ws.onerror = () => { document.getElementById('status').textContent = 'Server not running on 8767'; };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.x !== undefined && msg.y !== undefined) {
      ballX = msg.x * W;
      ballY = msg.y * H;
      trail.push({x: ballX, y: ballY, t: Date.now()});
      if (trail.length > 30) trail.shift();
    }
  };
}

function extractAudioFeatures() {
  if (!analyser || !freqData) return 0;
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);
  const sr = audioCtx.sampleRate;
  const binHz = sr / analyser.fftSize;
  function bandEnergy(lo, hi) {
    const loB = Math.max(0, Math.floor(lo / binHz));
    const hiB = Math.min(freqData.length - 1, Math.ceil(hi / binHz));
    if (hiB <= loB) return 0;
    let sum = 0;
    for (let i = loB; i <= hiB; i++) sum += freqData[i];
    return (sum / ((hiB - loB + 1) * 255));
  }
  const bass = bandEnergy(20, 80);
  const mid = bandEnergy(250, 2000);
  const high = bandEnergy(4000, 20000);
  let totalEnergy = 0;
  for (let i = 0; i < freqData.length; i++) totalEnergy += freqData[i];
  totalEnergy /= (freqData.length * 255);
  const flux = Math.max(0, totalEnergy - prevOnsetEnergy);
  const onset = Math.min(1, flux * 8);
  prevOnsetEnergy = totalEnergy * 0.7 + prevOnsetEnergy * 0.3;
  if (onset > 0.3) { beatTimes.push(performance.now()); while (beatTimes.length > 20) beatTimes.shift(); if (beatTimes.length >= 3) { let iv=0,ct=0; for(let i=1;i<beatTimes.length;i++){iv+=beatTimes[i]-beatTimes[i-1];ct++;} bpmEstimate=Math.min(1,Math.max(0,(60000/(iv/ct)-60)/140)); }}
  let cN=0,cD=0; for(let i=0;i<freqData.length;i++){cN+=(i*binHz)*freqData[i];cD+=freqData[i];}
  const centroidNorm = cD>0?Math.min(1,cN/cD/(sr/2)):0;
  let rmsSum=0; for(let i=0;i<timeData.length;i++){const v=(timeData[i]-128)/128;rmsSum+=v*v;}
  const rms = Math.min(1, Math.sqrt(rmsSum/timeData.length)*3);
  const raw = [bass,mid,high,onset,bpmEstimate,centroidNorm,rms];
  for(let i=0;i<7;i++){emaState[i]=EMA_ALPHA*raw[i]+(1-EMA_ALPHA)*emaState[i];ctx16[i*2]=raw[i];ctx16[i*2+1]=emaState[i];}
  ctx16[14]=0;ctx16[15]=0;
  return rms;
}

function draw() {
  const rms = (ctx16[12]+ctx16[13])/2;

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.strokeStyle = '#33ffcc33';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H*0.92);
  ctx.lineTo(W, H*0.92);
  ctx.stroke();

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const alpha = (i / trail.length) * 0.4;
    const age = (Date.now() - trail[i].t) / 3000;
    if (age > 1) continue;
    ctx.beginPath();
    ctx.arc(trail[i].x, trail[i].y, 3, 0, Math.PI*2);
    ctx.fillStyle = `rgba(51, 255, 204, ${alpha * (1-age)})`;
    ctx.fill();
  }

  // Ball
  const radius = 12 + rms * 8;
  ctx.beginPath();
  ctx.arc(ballX, ballY, radius, 0, Math.PI*2);
  const grad = ctx.createRadialGradient(ballX-3, ballY-3, 0, ballX, ballY, radius);
  grad.addColorStop(0, rms > 0.3 ? '#ff33cc' : '#33ffcc');
  grad.addColorStop(1, rms > 0.3 ? '#cc0099' : '#009977');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#33ffcc';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Audio meter bar at top
  const meterW = rms * W * 0.8;
  ctx.fillStyle = rms > 0.3 ? '#ff33cc44' : '#33ffcc22';
  ctx.fillRect(W*0.1, 10, meterW, 6);

  requestAnimationFrame(draw);
}

// Send audio at 10fps
setInterval(() => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const rms = extractAudioFeatures();
  document.getElementById('meter-fill').style.width = (rms*100)+'%';
  ws.send(JSON.stringify({ audio: Array.from(ctx16) }));
}, 100);

// Init
document.getElementById('overlay').addEventListener('click', async () => {
  document.getElementById('overlay').remove();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx.createMediaStreamSource(stream).connect(analyser);
  } catch(e) { document.getElementById('status').textContent = 'Need mic!'; return; }
  connectWS();
  requestAnimationFrame(draw);
});
</script>
</body>
</html>
