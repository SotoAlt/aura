# DIAMOND diffusion world model configs for AURA

aura_diamond_tiny:
  # CPU smoke test — minimal config
  image_size: 64
  channels: [32, 64, 128]
  num_res_blocks: 1
  attention_at: []
  context_frames: 4
  cond_dim: 16
  denoising_steps: 3
  batch_size: 4
  lr: 1.0e-4
  grad_clip: 1.0
  ema_decay: 0.999
  sigma_min: 0.002
  sigma_max: 80.0
  sigma_data: 0.5
  rho: 7.0
  P_mean: -1.2
  P_std: 1.2
  ar_start_step: 0  # no AR for smoke test
  ar_fraction: 0.0
  ar_rollout_len: 0

aura_diamond:
  # Full training config for Colab T4
  image_size: 64
  channels: [64, 128, 256, 256]
  num_res_blocks: 2
  attention_at: [8]  # self-attention at 8x8 resolution
  context_frames: 4
  cond_dim: 16
  denoising_steps: 3
  batch_size: 32
  lr: 2.0e-4
  grad_clip: 1.0
  ema_decay: 0.999
  sigma_min: 0.002
  sigma_max: 80.0
  sigma_data: 0.5
  rho: 7.0
  P_mean: -1.2
  P_std: 1.2
  ar_start_step: 20000  # enable AR rollouts after 20K steps
  ar_fraction: 0.5      # 50% of batches use AR rollouts
  ar_rollout_len: 4     # roll out 4 frames during AR training

aura_abstract_128:
  # 128x128 abstract visual training — audio-reactive wormhole
  image_size: 128
  channels: [64, 128, 256, 256]
  num_res_blocks: 2
  attention_at: [16]  # self-attention at 16x16 resolution
  context_frames: 4
  cond_dim: 16
  denoising_steps: 3
  batch_size: 16       # smaller batch for 128x128
  lr: 2.0e-4
  grad_clip: 1.0
  ema_decay: 0.999
  sigma_min: 0.002
  sigma_max: 80.0
  sigma_data: 0.5
  rho: 7.0
  P_mean: -1.2
  P_std: 1.2
  ar_start_step: 15000
  ar_fraction: 0.5
  ar_rollout_len: 4

aura_diamond_v2:
  # Paper-matched config (eloialonso/diamond verified values)
  # 64x64, flat channels, no attention, correct sigma schedule
  image_size: 64
  channels: [64, 64, 64, 64]
  num_res_blocks: 2
  attention_at: []           # NO attention (paper uses attn_depths=[0,0,0,0])
  context_frames: 4
  cond_dim: 16
  denoising_steps: 3
  batch_size: 32
  lr: 1.0e-4                 # paper: 1e-4
  weight_decay: 1.0e-2       # paper: 1e-2
  grad_clip: 1.0
  ema_decay: 0.0             # paper: no EMA
  sigma_min: 0.002
  sigma_max: 20.0            # paper training: 20 (NOT 80)
  sigma_max_inference: 5.0   # paper inference: 5.0
  sigma_offset_noise: 0.3    # paper: 0.3 (brightness consistency)
  sigma_data: 0.5
  rho: 7.0
  P_mean: -0.4              # paper: loc=-0.4 (NOT -1.2)
  P_std: 1.2                # paper: scale=1.2
  ar_start_step: 15000
  ar_fraction: 0.5
  ar_rollout_len: 4
